version: "3"
services:
    db:
        image: mysql:8.4
        environment:
            MYSQL_DATABASE: fluent_bot
            MYSQL_USER: fluent
            MYSQL_PASSWORD: fluent-bot
            MYSQL_ROOT_PASSWORD: fluent-bot
            MYSQL_SQL_MODE: "NO_ENGINE_SUBSTITUTION"
        command: --log-bin-trust-function-creators=1
        ports:
            - "3306:3306"
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - local_network

    db-viewer:
        image: adminer:latest
        environment:
            ADMINER_DEFAULT_SERVER: db
            ADMINER_DEFAULT_USER: fluent
            ADMINER_DEFAULT_PASSWORD: fluent-bot
        ports:
            - "8080:8080"
        depends_on:
            - db
        networks:
            - local_network

    scraper:
        build:
            context: ../fluent-bot-scraper
            target: development
        ports:
            - "4000:4000"
        volumes:
            - ../fluent-bot-scraper:/app
            - /app/node_modules
        environment:
            - NODE_ENV=development
        networks:
            - local_network
        depends_on:
            - db

networks:
    local_network:
        driver: bridge

volumes:
    db_data:
    mysql_data:
        driver: local
